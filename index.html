<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TryThis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .screen { display: none; }
        .screen.active { display: block; }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .link-text {
            text-align: center;
            margin-top: 16px;
            color: #666;
            font-size: 14px;
        }
        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .home-content {
            text-align: center;
        }
        .user-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .user-info p {
            margin: 8px 0;
            color: #333;
        }
        .logout-btn {
            background: #dc3545;
        }
        .logout-btn:hover { opacity: 0.9; }

        .loading {
            text-align: center;
            color: #666;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Splash Screen -->
        <div id="splash" class="screen active">
            <div class="header">
                <div class="logo">🎯</div>
                <h1>TryThis</h1>
                <p class="subtitle">Save Now. Try Later.</p>
            </div>
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Checking authentication...</p>
            </div>
        </div>

        <!-- Signup Screen -->
        <div id="signup" class="screen">
            <div class="header">
                <div class="logo">🎯</div>
                <h1>Create Account</h1>
                <p class="subtitle">Sign up to get started</p>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="At least 8 characters">
            </div>

            <button onclick="handleSignup()">Sign Up</button>

            <div class="link-text">
                Already have an account? <a onclick="showScreen('login')">Login</a>
            </div>

            <div id="signup-message" class="message"></div>
        </div>

        <!-- Login Screen -->
        <div id="login" class="screen">
            <div class="header">
                <div class="logo">🎯</div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Sign in to your account</p>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Your password">
            </div>

            <button onclick="handleLogin()">Login</button>

            <div class="link-text">
                Don't have an account? <a onclick="showScreen('signup')">Sign Up</a>
            </div>

            <div id="login-message" class="message"></div>
        </div>

        <!-- Home Screen -->
        <div id="home" class="screen">
            <div class="header">
                <div class="logo">🏠</div>
                <h1>Home</h1>
                <p class="subtitle">Welcome to TryThis</p>
            </div>

            <div class="user-info">
                <p><strong>Logged in as:</strong></p>
                <p id="user-email" style="color: #667eea;"></p>
                <p style="font-size: 12px; margin-top: 10px; color: #999;" id="user-name"></p>
            </div>

            <button onclick="handleLogout()" class="logout-btn">Logout</button>

            <p style="margin-top: 20px; color: #666; font-size: 14px;">
                ✅ Backend: <strong id="backend-status">Checking...</strong>
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:4000';

        // Initialize
        window.addEventListener('load', () => {
            checkBackend();
            setTimeout(() => checkAuth(), 1000);
        });

        function checkBackend() {
            fetch(`${API_URL}/health`)
                .then(r => r.json())
                .then(d => {
                    document.getElementById('backend-status').textContent = '✅ Running';
                    document.getElementById('backend-status').style.color = '#28a745';
                })
                .catch(e => {
                    document.getElementById('backend-status').textContent = '❌ Down';
                    document.getElementById('backend-status').style.color = '#dc3545';
                });
        }

        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (token && user.email) {
                document.getElementById('user-email').textContent = user.email;
                document.getElementById('user-name').textContent = `Name: ${user.name}`;
                showScreen('home');
            } else {
                showScreen('signup');
            }
        }

        function showScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(name).classList.add('active');
        }

        async function handleSignup() {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            if (!name || !email || !password) {
                showMessage('signup-message', 'Please fill all fields', 'error');
                return;
            }

            if (password.length < 8) {
                showMessage('signup-message', 'Password must be at least 8 characters', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('auth_token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    showScreen('home');
                } else {
                    showMessage('signup-message', data.error.message, 'error');
                }
            } catch (e) {
                showMessage('signup-message', 'Connection error', 'error');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showMessage('login-message', 'Please enter email and password', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('auth_token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    showScreen('home');
                } else {
                    showMessage('login-message', data.error.message, 'error');
                }
            } catch (e) {
                showMessage('login-message', 'Connection error', 'error');
            }
        }

        function handleLogout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user');
            showScreen('signup');
        }

        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = `message ${type}`;
        }
    </script>
</body>
</html>
