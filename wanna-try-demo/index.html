<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wanna Try — Interactive Demo</title>
<style>
  :root{
    --teal:#0d6e6e; --teal-dark:#0a5252; --teal-light:#128a8a;
    --ink:#10312f; --bubble:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 12% -10%, #14a3a3 0%, transparent 55%),
      radial-gradient(900px 700px at 110% 110%, #0a5252 0%, transparent 50%),
      linear-gradient(135deg,#0d6e6e 0%, #0a4f4f 100%);
    color:#fff;min-height:100vh;overflow-x:hidden;position:relative;
    display:flex;flex-direction:column;align-items:center;
  }

  /* ---------- Floating sample-saves background ---------- */
  .bg-wall{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .save-card{
    position:absolute;width:194px;background:#fff;color:#14302e;border-radius:14px;
    padding:10px 12px;box-shadow:0 12px 30px rgba(0,0,0,.25);opacity:.92;
    animation:floaty linear infinite;
  }
  @keyframes floaty{0%{transform:translateY(0)}50%{transform:translateY(-18px)}100%{transform:translateY(0)}}
  .save-card .row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .save-card .pf{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700}
  .save-card .pname{font-size:11px;font-weight:700;color:#6b7a78}
  .save-card .thumb{height:54px;border-radius:9px;margin-bottom:8px;background-size:cover;background-position:center}
  .save-card .title{font-size:12.5px;font-weight:700;line-height:1.25}
  .save-card .chip{display:inline-block;margin-top:8px;font-size:10px;font-weight:700;color:var(--teal);
    background:rgba(13,110,110,.1);padding:2px 8px;border-radius:999px}

  .topbar{width:100%;text-align:center;padding:20px 16px 4px;z-index:2}
  .brand{display:inline-flex;align-items:center;gap:10px}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:#fff;color:var(--teal);
    display:grid;place-items:center;font-size:20px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .brand h1{font-family:Georgia,serif;font-size:26px}
  .brand .tag{font-size:12px;opacity:.85;font-style:italic;margin-top:2px}

  .stage{flex:1;width:100%;max-width:1040px;display:flex;align-items:center;justify-content:center;
    gap:26px;padding:8px 18px 0;flex-wrap:wrap;z-index:2}

  /* ---------- Phone ---------- */
  .phone-wrap{position:relative}
  .phone{position:relative;width:300px;height:620px;border-radius:46px;background:#0c0c0e;padding:12px;
    box-shadow:0 30px 70px rgba(0,0,0,.45), inset 0 0 0 2px #2a2a2e}
  .phone::after{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);
    width:118px;height:26px;background:#0c0c0e;border-radius:0 0 16px 16px;z-index:3}
  .screen{position:relative;width:100%;height:100%;border-radius:35px;overflow:hidden;background:#f4f2ed}
  .screen img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;
    opacity:0;transform:scale(1.03);transition:opacity .5s ease, transform .6s ease}
  .screen img.active{opacity:1;transform:scale(1)}
  .tap{position:absolute;z-index:5;width:46px;height:46px;border-radius:50%;
    border:3px solid rgba(255,255,255,.9);background:rgba(13,110,110,.35);
    transform:translate(-50%,-50%) scale(.4);opacity:0;pointer-events:none}
  .tap.go{animation:tap 1s ease-out}
  @keyframes tap{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
    35%{opacity:1;transform:translate(-50%,-50%) scale(.9)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}}

  /* ---------- Guide character + bubble ---------- */
  .guide{width:310px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .bubble{position:relative;background:var(--bubble);color:var(--ink);border-radius:18px;
    padding:16px 18px;min-height:104px;width:100%;box-shadow:0 14px 34px rgba(0,0,0,.28);
    animation:pop .45s cubic-bezier(.2,1.3,.4,1)}
  .bubble:after{content:"";position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
    border-width:12px 12px 0;border-style:solid;border-color:var(--bubble) transparent transparent}
  @keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  .bubble .step-tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
    color:#fff;background:var(--teal);padding:3px 9px;border-radius:999px;margin-bottom:8px}
  .bubble h2{font-size:17px;line-height:1.25;margin-bottom:5px;color:var(--teal-dark)}
  .bubble p{font-size:13.5px;line-height:1.45;color:#3a4a48}

  .avatar-svg{width:150px;height:150px;filter:drop-shadow(0 12px 18px rgba(0,0,0,.3))}
  .bob{animation:bob 3s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .arm{transform-origin:118px 150px;animation:wave 2.6s ease-in-out infinite}
  @keyframes wave{0%,60%,100%{transform:rotate(0deg)}70%{transform:rotate(-22deg)}85%{transform:rotate(-6deg)}}
  .lid{transform-origin:center;animation:blink 4.2s infinite}
  @keyframes blink{0%,95%,100%{transform:scaleY(0)}97%{transform:scaleY(1)}}
  .who{font-size:12px;opacity:.92;font-weight:700;text-align:center}
  .who span{opacity:.7;font-weight:500}

  /* ---------- Controls ---------- */
  .controls{width:100%;max-width:860px;display:flex;align-items:center;justify-content:center;gap:12px;
    padding:12px 18px 26px;z-index:2;flex-wrap:wrap}
  button.nav{border:0;cursor:pointer;font-weight:700;font-size:14px;color:#fff;
    background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
    padding:11px 18px;border-radius:999px;backdrop-filter:blur(6px);transition:.18s}
  button.nav:hover{background:rgba(255,255,255,.28)}
  button.nav:disabled{opacity:.4;cursor:not-allowed}
  button.play{background:#fff;color:var(--teal-dark);min-width:112px}
  button.pdf{background:#ffd24a;color:#5a4300;border-color:#ffd24a}
  .dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:340px}
  .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.32);cursor:pointer;transition:.2s}
  .dot.on{background:#fff;transform:scale(1.35)}
  .counter{font-size:13px;opacity:.85;min-width:54px;text-align:center;font-variant-numeric:tabular-nums}
  .progress{position:fixed;top:0;left:0;height:4px;background:#ffd24a;width:0;transition:width .3s linear;z-index:10}
  .hint{font-size:12px;opacity:.65;margin-top:2px;text-align:center}

  /* live-app CTA */
  .live-cta{position:fixed;top:16px;right:18px;z-index:20;text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:14px;
    color:#0a4f4f;background:#ffd24a;padding:11px 18px;border-radius:999px;
    box-shadow:0 8px 24px rgba(0,0,0,.3);animation:ctapulse 2.2s ease-in-out infinite;transition:transform .15s}
  .live-cta:hover{transform:translateY(-2px) scale(1.04)}
  @keyframes ctapulse{0%,100%{box-shadow:0 8px 24px rgba(255,210,74,.35)}50%{box-shadow:0 8px 34px rgba(255,210,74,.85)}}
  .bubble-cta{display:inline-flex;align-items:center;gap:8px;margin-top:12px;text-decoration:none;
    font-weight:800;font-size:14px;color:#fff;background:var(--teal);padding:11px 18px;border-radius:999px;
    box-shadow:0 6px 16px rgba(13,110,110,.4);transition:transform .15s}
  .bubble-cta:hover{transform:translateY(-2px) scale(1.04);background:var(--teal-dark)}
  @media (max-width:760px){.live-cta{top:auto;bottom:14px;right:14px}}
  @media print{.live-cta{display:none !important}}

  /* mobile horizontal marquee of sample saves */
  .mobile-strip{display:none}
  @media (max-width:1100px){
    .bg-wall{display:none}
    .mobile-strip{display:block;width:100%;overflow:hidden;z-index:2;padding:10px 0 2px;
      -webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);
              mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent)}
    .mobile-strip .track{display:flex;gap:10px;width:max-content;animation:marquee 32s linear infinite}
    .mobile-strip .save-card{position:static;flex:0 0 auto;width:158px;animation:none;opacity:.96;padding:9px 11px}
    .mobile-strip .thumb{height:46px}
  }
  @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (max-width:760px){
    .stage{gap:6px}.guide{order:-1;width:300px}
    .avatar-svg{width:96px;height:96px;margin-top:-6px}.bubble{min-height:auto}
  }

  /* ---------- Print / PDF ---------- */
  #printDoc{display:none}
  @media print{
    @page{margin:14mm}
    body{background:#fff;color:#10312f;display:block}
    .bg-wall,.mobile-strip,.topbar,.stage,.controls,.progress,.hint{display:none !important}
    #printDoc{display:block}
    .p-cover{text-align:center;padding:40px 0 28px;border-bottom:3px solid #0d6e6e;margin-bottom:24px;page-break-after:always}
    .p-cover .plogo{font-size:46px}
    .p-cover h1{font-family:Georgia,serif;font-size:40px;color:#0a5252;margin:6px 0}
    .p-cover .ptag{font-style:italic;color:#0d6e6e;font-size:16px}
    .p-cover .pmeta{margin-top:14px;color:#555;font-size:13px}
    .p-slide{display:flex;gap:22px;align-items:flex-start;padding:16px 0;page-break-inside:avoid;border-bottom:1px solid #e6e6e6}
    .p-slide img{width:150px;border-radius:14px;border:1px solid #ddd}
    .p-txt{flex:1}
    .p-txt .pnum{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#fff;background:#0d6e6e;padding:3px 9px;border-radius:999px}
    .p-txt h3{font-size:19px;color:#0a5252;margin:8px 0 6px}
    .p-txt p{font-size:14px;line-height:1.5;color:#333}
    .p-txt .pwho{margin-top:8px;font-size:12px;color:#0d6e6e;font-weight:700}
  }
</style>
</head>

  {p:"TikTok",bg:"#111",ic:"♪",cat:"Travel",t:"Tokyo 4am street food",th:"#c2607a"},
  {p:"Instagram",bg:"#e1306c",ic:"📷",cat:"Eat",t:"Restaurant-style paneer tikka",th:"#d97a4f"},
];
const positions=[
  [2,8],[3,40],[1,72],[14,22],[13,58],[12,86],     // left rail
  [82,6],[95,30],[84,54],[93,76],[83,90],[96,52],   // right rail
];
(function buildWall(){
  const wall=document.getElementById('bgWall');
  samples.forEach((s,i)=>{
    const [x,y]=positions[i]; const card=document.createElement('div');
    card.className='save-card';
    card.style.left=x+'%'; card.style.top=y+'%';
    card.style.animationDuration=(7+i%5)+'s'; card.style.animationDelay=(i*0.4)+'s';
    card.innerHTML=`<div class="row"><span class="pf" style="background:${s.bg}">${s.ic}</span>
      <span class="pname">${s.p}</span></div>
      <div class="thumb" style="background:linear-gradient(135deg,${s.th},#cfcabf)"></div>
      <div class="title">${s.t}</div><span class="chip">${s.cat}</span>`;
    wall.appendChild(card);
  });
  // mobile marquee: same cards, duplicated for a seamless loop
  const track=document.getElementById('mTrack');
  const cardHTML=s=>`<div class="save-card"><div class="row"><span class="pf" style="background:${s.bg}">${s.ic}</span>
    <span class="pname">${s.p}</span></div>
    <div class="thumb" style="background:linear-gradient(135deg,${s.th},#cfcabf)"></div>
    <div class="title">${s.t}</div><span class="chip">${s.cat}</span></div>`;
  track.innerHTML = samples.map(cardHTML).join('') + samples.map(cardHTML).join('');
})();

/* ---------- Engine ---------- */
const screen=document.getElementById('screen'), tap=document.getElementById('tap');
const stepTag=document.getElementById('stepTag'), titleEl=document.getElementById('title'),
  descEl=document.getElementById('desc'), bubble=document.getElementById('bubble'),
  counter=document.getElementById('counter'), dotsWrap=document.getElementById('dots'),
  progress=document.getElementById('progress'), avatar=document.getElementById('avatar'),
  who=document.getElementById('who'), bubbleCta=document.getElementById('bubbleCta');
const prevBtn=document.getElementById('prev'), nextBtn=document.getElementById('next'),
  playBtn=document.getElementById('play'), pdfBtn=document.getElementById('pdf');

const imgEls=slides.map((s,i)=>{const im=document.createElement('img');im.src=s.img;im.alt=s.title;screen.insertBefore(im,tap);return im;});
slides.forEach((s,i)=>{const d=document.createElement('span');d.className='dot';d.onclick=()=>go(i);dotsWrap.appendChild(d);});
const dots=[...dotsWrap.children];

const _sp=new URLSearchParams(location.search);
let cur=Math.max(0,Math.min(slides.length-1,(parseInt(_sp.get('s'))||1)-1));
let playing=false, timer=null, curChar=null; const DURATION=4500;
const _capture=_sp.get('capture')==='1'; // hides controls/hint for clean video frames

function render(){
  imgEls.forEach((im,i)=>im.classList.toggle('active',i===cur));
  dots.forEach((d,i)=>d.classList.toggle('on',i===cur));
  const s=slides[cur];
  bubble.style.animation='none'; void bubble.offsetWidth; bubble.style.animation='';
  stepTag.textContent=`Step ${cur+1} / ${slides.length}`;
  titleEl.textContent=s.title; descEl.textContent=s.desc;
  counter.textContent=`${cur+1} / ${slides.length}`;
  progress.style.width=((cur+1)/slides.length*100)+'%';
  prevBtn.disabled=cur===0; nextBtn.disabled=cur===slides.length-1 && !playing;
  if(s.c!==curChar){ curChar=s.c; const ch=CHARS[s.c]; avatar.innerHTML=ch.svg; who.innerHTML=`${ch.name} <span>· ${ch.role}</span>`; }
  if(s.cta){ bubbleCta.href=s.cta; bubbleCta.textContent=s.ctaLabel||"Open the live app ↗"; bubbleCta.style.display="inline-flex"; }
  else{ bubbleCta.style.display="none"; }
  if(s.tap){tap.style.left=s.tap[0]+'px';tap.style.top=s.tap[1]+'px';tap.classList.remove('go');void tap.offsetWidth;tap.classList.add('go');}
}
function go(i){cur=Math.max(0,Math.min(slides.length-1,i));render();restartTimer();}
function next(){if(cur<slides.length-1)go(cur+1);else stopPlay();}
function prev(){go(cur-1);}
function startPlay(){playing=true;playBtn.textContent='⏸ Pause';if(cur===slides.length-1)cur=0;render();restartTimer();}
function stopPlay(){playing=false;playBtn.textContent='▶ Play';clearInterval(timer);}
function restartTimer(){clearInterval(timer);if(playing)timer=setInterval(()=>{cur<slides.length-1?go(cur+1):stopPlay();},DURATION);}

prevBtn.onclick=prev; nextBtn.onclick=next;
playBtn.onclick=()=>playing?stopPlay():startPlay();
pdfBtn.onclick=()=>{stopPlay();window.print();};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next(); if(e.key==='ArrowLeft')prev();
  if(e.key===' '){e.preventDefault();playing?stopPlay():startPlay();}
});

/* ---------- Build printable PDF doc ---------- */
(function buildPrint(){
  const pd=document.getElementById('printDoc');
  let html=`<div class="p-cover"><div class="plogo">🔖</div><h1>Wanna Try</h1>
    <div class="ptag">See it · Save it · Try it</div>
    <div class="pmeta">Product walkthrough · ${slides.length} screens · with Maya, Leo & Zoe</div>
    <div class="pmeta">Try the live app: https://trythis-frontend.vercel.app/</div></div>`;
  slides.forEach((s,i)=>{
    const ch=CHARS[s.c];
    html+=`<div class="p-slide"><img src="${s.img}" alt="">
      <div class="p-txt"><span class="pnum">Step ${i+1} / ${slides.length}</span>
      <h3>${s.title}</h3><p>${s.desc}</p>
      <div class="pwho">${ch.name} · ${ch.role}</div></div></div>`;
  });
  pd.innerHTML=html;
})();

if(_capture){
  document.querySelector('.controls').style.display='none';
  document.querySelector('.hint').style.display='none';
  document.querySelector('.live-cta').style.display='none';
}
render();
</script>
</body>
</html>
