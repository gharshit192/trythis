<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TryThis · Onboarding 2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link rel="stylesheet" href="../shared/theme.css">
<style>
.ob { padding: 24px 24px 32px; background: var(--paper); min-height: 100%; display: flex; flex-direction: column; }
.dots { display: flex; gap: 5px; }
.dot { width: 24px; height: 3px; background: var(--hairline); border-radius: 2px; }
.dot.active { background: var(--forest); }
.center-save { background: var(--linen); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; border: 0.5px solid var(--hairline); }
.center-thumb { width: 28px; height: 28px; border-radius: 6px; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--hairline); border-top-color: var(--forest); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.cat-tile { background: var(--linen); border-radius: 12px; padding: 14px 8px; text-align: center; border: 0.5px solid var(--hairline); }
.cat-tile i { font-size: 22px; color: var(--forest); }
.cat-tile p { margin-top: 6px; font-size: 11px; font-weight: 500; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="ob">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px;">
      <div class="dots">
        <div class="dot active"></div><div class="dot active"></div><div class="dot"></div>
      </div>
      <span style="font-size: 13px; color: var(--slate);">Skip</span>
    </div>

    <div style="padding: 48px 0 32px;">
      <div style="display: flex; justify-content: center; margin-bottom: 18px;">
        <div class="center-save">
          <div class="center-thumb thumb-1"></div>
          <div>
            <p style="font-size: 12px; font-weight: 500;">Reel saved</p>
            <p style="font-size: 10px; color: var(--slate); margin-top: 1px;">Analyzing…</p>
          </div>
          <div class="spinner"></div>
        </div>
      </div>

      <div style="display: flex; justify-content: center; gap: 28px; margin-bottom: 16px; color: var(--mute);">
        <i class="ti ti-arrow-down-left" style="font-size: 18px;"></i>
        <i class="ti ti-arrow-down" style="font-size: 18px;"></i>
        <i class="ti ti-arrow-down-right" style="font-size: 18px;"></i>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
        <div class="cat-tile"><i class="ti ti-mountain"></i><p>Travel</p></div>
        <div class="cat-tile"><i class="ti ti-coffee"></i><p>Cafes</p></div>
        <div class="cat-tile"><i class="ti ti-confetti"></i><p>Experiences</p></div>
      </div>
    </div>

    <div style="text-align: center; padding: 0 16px;">
      <h1 class="display" style="font-size: 26px; margin-bottom: 12px;">AI sorts it for you</h1>
      <p style="font-size: 14px; color: var(--slate); line-height: 1.55;">No folders, no tags, no work. Every save lands in the right place — Travel, Cafes, or Experiences.</p>
    </div>

    <div style="margin-top: auto;">
      <button class="btn-primary">Next <i class="ti ti-arrow-right" style="font-size: 16px;"></i></button>
    </div>

  </div>
</div>
</body>
</html>
