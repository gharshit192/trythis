<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TryThis · Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link rel="stylesheet" href="../shared/theme.css">
<style>
.login-screen { padding: 48px 28px 32px; min-height: 100%; display: flex; flex-direction: column; background: var(--paper); }
.brand-mark { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; background: var(--forest); border-radius: 16px; margin-bottom: 14px; }
.brand-mark i { font-size: 28px; color: var(--linen); }
.brand-wordmark { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
.tagline { font-size: 13px; color: var(--slate); margin-top: 4px; font-style: italic; }
.divider-or { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
.divider-or .line { flex: 1; height: 0.5px; background: var(--hairline); }
.divider-or span { font-size: 11px; color: var(--mute); letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="login-screen">

    <div style="text-align: center; margin-bottom: 48px; margin-top: 24px;">
      <div class="brand-mark"><i class="ti ti-bookmark"></i></div>
      <p class="brand-wordmark">TryThis</p>
      <p class="tagline">Save it. Find it. Try it.</p>
    </div>

    <div style="margin-bottom: 24px;">
      <h1 class="display" style="font-size: 28px; margin-bottom: 6px;">Welcome back</h1>
      <p style="font-size: 14px; color: var(--slate);">Sign in to pick up where you left off.</p>
    </div>

    <p class="label">Email</p>
    <div class="input" style="margin-bottom: 14px;"><span class="placeholder">you@example.com</span></div>

    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;">
      <span class="label" style="margin-bottom: 0;">Password</span>
      <a style="font-size: 13px; color: var(--amber-link); font-weight: 500; text-decoration: none;">Forgot?</a>
    </div>
    <div class="input" style="justify-content: space-between; margin-bottom: 24px;">
      <span style="letter-spacing: 0.25em;">••••••••</span>
      <i class="ti ti-eye" style="font-size: 18px; color: var(--slate);"></i>
    </div>

    <button class="btn-primary">Sign in</button>

    <div class="divider-or"><div class="line"></div><span>or</span><div class="line"></div></div>

    <button class="btn-secondary" style="margin-bottom: 10px;">
      <i class="ti ti-brand-apple" style="font-size: 18px;"></i>
      Continue with Apple
    </button>
    <button class="btn-secondary">
      <i class="ti ti-brand-google" style="font-size: 18px;"></i>
      Continue with Google
    </button>

    <p style="text-align: center; margin-top: auto; padding-top: 32px; font-size: 14px; color: var(--slate);">
      New here? <span style="color: var(--ink); font-weight: 500;">Create an account</span>
    </p>

  </div>
</div>
</body>
</html>
