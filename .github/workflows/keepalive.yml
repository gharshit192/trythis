name: Keep backend warm

# Render's free tier spins the service down after ~15 min idle, so a new user's
# first login waits ~30-50s for a cold start. Pinging /health keeps it warm.
# NOTE: GitHub Actions cron can be delayed under load — for guaranteed warmth use
# an external pinger (cron-job.org / UptimeRobot) on the same /health URL.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -sS -m 40 -o /dev/null -w "health: %{http_code} in %{time_total}s\n" \
            https://trythis-am0j.onrender.com/health || true
